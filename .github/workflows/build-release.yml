name: Build Release (Secure Public Builder)

# SECURITY MODEL:
# This workflow builds binaries from the private repo using public CI minutes.
# It ONLY runs on repository_dispatch (not on PRs, pushes, or forks).
# Secrets are stored in repository secrets.
# The dispatch payload includes an HMAC signature to prevent unauthorized triggers.

on:
  repository_dispatch:
    types: [build-release]
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to build (e.g. 0.2.24) — must match an existing tag in the private repo'
        required: true

# Minimal permissions - only what's needed
permissions:
  contents: read
  actions: read

# Prevent concurrent builds
concurrency:
  group: build-release-${{ github.event.client_payload.version || github.event.inputs.version }}
  cancel-in-progress: false

env:
  CARGO_INCREMENTAL: 0

jobs:
  # ─────────────────────────────────────────────────────────────
  # Step 1: Validate the dispatch came from the private repo
  # ─────────────────────────────────────────────────────────────
  validate:
    runs-on: ubuntu-latest
    environment: build-gate
    outputs:
      version: ${{ steps.check.outputs.version }}
      tag: ${{ steps.check.outputs.tag }}
      sha: ${{ steps.check.outputs.sha }}
    steps:
      - name: Validate and resolve version
        id: check
        env:
          DISPATCH_SECRET: ${{ secrets.DISPATCH_SECRET }}
          PRIVATE_TOKEN: ${{ secrets.CATARINA_PRIVATE_READ_TOKEN }}
        run: |
          set -euo pipefail

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            # ── Manual trigger ──────────────────────────────────────────
            # GitHub auth already guarantees only repo admins can reach here.
            # No HMAC needed — resolve SHA from the private repo tag instead.
            VERSION="${{ github.event.inputs.version }}"
            VERSION="${VERSION#v}"  # strip leading v if provided

            if ! echo "$VERSION" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+$'; then
              echo "::error::Invalid version format: $VERSION"
              exit 1
            fi

            echo "::add-mask::${PRIVATE_TOKEN}"
            SHA=$(curl -sf \
              -H "Authorization: Bearer ${PRIVATE_TOKEN}" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/jeancatarina/catarina-claude/commits/v${VERSION}" \
              | jq -r '.sha // empty')

            if [ -z "$SHA" ]; then
              echo "::error::Tag v${VERSION} not found in private repo. Push the tag first."
              exit 1
            fi
            echo "✅ Manual trigger: v${VERSION} @ ${SHA:0:8}"
          else
            # ── Automated repository_dispatch ───────────────────────────
            # Validate HMAC signature to prove the call came from the private repo.
            echo "::add-mask::${DISPATCH_SECRET}"

            VERSION="${{ github.event.client_payload.version }}"
            SHA="${{ github.event.client_payload.sha }}"
            SIGNATURE="${{ github.event.client_payload.signature }}"
            TIMESTAMP="${{ github.event.client_payload.timestamp }}"

            if [ -z "$VERSION" ] || [ -z "$SHA" ] || [ -z "$SIGNATURE" ] || [ -z "$TIMESTAMP" ]; then
              echo "::error::Missing required payload fields. Rejecting dispatch."
              exit 1
            fi

            EXPECTED_SIG=$(echo -n "${VERSION}:${SHA}:${TIMESTAMP}" | openssl dgst -sha256 -hmac "$DISPATCH_SECRET" | awk '{print $2}')
            if [ "$SIGNATURE" != "$EXPECTED_SIG" ]; then
              echo "::error::Invalid signature. This dispatch did not come from an authorized source."
              exit 1
            fi

            NOW=$(date +%s)
            DIFF=$((NOW - TIMESTAMP))
            if [ "$DIFF" -gt 300 ] || [ "$DIFF" -lt -60 ]; then
              echo "::error::Timestamp out of range (${DIFF}s). Possible replay attack."
              exit 1
            fi

            if ! echo "$VERSION" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+$'; then
              echo "::error::Invalid version format: $VERSION"
              exit 1
            fi
            echo "✅ Dispatch validated: v${VERSION} @ ${SHA:0:8}"
          fi

          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag=v$VERSION" >> $GITHUB_OUTPUT
          echo "sha=$SHA" >> $GITHUB_OUTPUT

  # ─────────────────────────────────────────────────────────────
  # Step 2: Build on each platform
  # ─────────────────────────────────────────────────────────────
  build-macos:
    needs: validate
    runs-on: macos-latest
    steps:
      - name: Clone private repo at specific SHA
        env:
          PRIVATE_TOKEN: ${{ secrets.CATARINA_PRIVATE_READ_TOKEN }}
        run: |
          set -euo pipefail

          # Mask the token and source paths from logs
          echo "::add-mask::${PRIVATE_TOKEN}"
          echo "::add-mask::$(pwd)/source"

          # Clone with depth=1 - suppress all output to prevent code leaks
          git clone --depth=1 \
            "https://x-access-token:${PRIVATE_TOKEN}@github.com/jeancatarina/catarina-claude.git" \
            source 2>&1 | head -1 || true

          cd source

          # Fetch and checkout exact SHA - MUST succeed (no || true)
          EXPECTED_SHA="${{ needs.validate.outputs.sha }}"
          git fetch --depth=1 origin "$EXPECTED_SHA" 2>/dev/null
          git checkout "$EXPECTED_SHA" 2>/dev/null

          # Hard verify SHA matches
          ACTUAL_SHA=$(git rev-parse HEAD)
          if [ "$ACTUAL_SHA" != "$EXPECTED_SHA" ]; then
            echo "::error::SHA mismatch! Expected ${EXPECTED_SHA:0:8}, got ${ACTUAL_SHA:0:8}. Aborting."
            exit 1
          fi
          echo "✅ Checked out: ${ACTUAL_SHA:0:8}"

          # Purge credentials from git config and credential store
          git remote set-url origin "https://REDACTED@github.com/redacted/redacted.git"
          git config --unset-all http.https://github.com/.extraheader 2>/dev/null || true
          unset PRIVATE_TOKEN

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Rust stable with both targets
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.7

      - name: Cache Cargo registry and target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            source/src-tauri/target
          key: macos-universal-cargo-${{ hashFiles('source/src-tauri/Cargo.lock') }}
          restore-keys: |
            macos-universal-cargo-

      - name: Install frontend dependencies
        working-directory: source
        env:
          RUSTC_WRAPPER: sccache
        run: npm ci 2>&1 | tail -5

      - name: Build ARM64 (Apple Silicon)
        working-directory: source
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ""
          RUSTC_WRAPPER: sccache
        run: |
          # Build with suppressed output to prevent code leaks in public logs
          echo "🔨 Building aarch64-apple-darwin..."
          if npx tauri build --target aarch64-apple-darwin > /tmp/build-arm64.log 2>&1; then
            echo "✅ ARM64 build succeeded ($(wc -l < /tmp/build-arm64.log) log lines suppressed)"
          else
            EXIT_CODE=$?
            echo "::error::ARM64 build failed with exit code $EXIT_CODE"
            echo "--- Last 5 lines (sanitized) ---"
            tail -5 /tmp/build-arm64.log | sed 's|source/||g; s|src-tauri/src/[^ ]*|[REDACTED_PATH]|g'
            rm -f /tmp/build-arm64.log
            exit $EXIT_CODE
          fi
          rm -f /tmp/build-arm64.log

      - name: Build x86_64 (Intel)
        working-directory: source
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ""
          RUSTC_WRAPPER: sccache
        run: |
          echo "🔨 Building x86_64-apple-darwin..."
          if npx tauri build --target x86_64-apple-darwin > /tmp/build-x64.log 2>&1; then
            echo "✅ x86_64 build succeeded ($(wc -l < /tmp/build-x64.log) log lines suppressed)"
          else
            EXIT_CODE=$?
            echo "::error::x86_64 build failed with exit code $EXIT_CODE"
            echo "--- Last 5 lines (sanitized) ---"
            tail -5 /tmp/build-x64.log | sed 's|source/||g; s|src-tauri/src/[^ ]*|[REDACTED_PATH]|g'
            rm -f /tmp/build-x64.log
            exit $EXIT_CODE
          fi
          rm -f /tmp/build-x64.log

      - name: Collect artifacts
        shell: bash
        run: |
          VERSION="${{ needs.validate.outputs.version }}"
          mkdir -p artifacts

          BUNDLE_ARM="source/src-tauri/target/aarch64-apple-darwin/release/bundle"
          find "$BUNDLE_ARM/dmg" -name "*.dmg" -exec cp {} "artifacts/cadente-${VERSION}-macos-arm64.dmg" \; 2>/dev/null || true
          find "$BUNDLE_ARM/macos" -name "*.app.tar.gz" -exec cp {} "artifacts/cadente-${VERSION}-macos-arm64.app.tar.gz" \; 2>/dev/null || true
          find "$BUNDLE_ARM/macos" -name "*.app.tar.gz.sig" -exec cp {} "artifacts/cadente-${VERSION}-macos-arm64.app.tar.gz.sig" \; 2>/dev/null || true

          BUNDLE_X64="source/src-tauri/target/x86_64-apple-darwin/release/bundle"
          find "$BUNDLE_X64/dmg" -name "*.dmg" -exec cp {} "artifacts/cadente-${VERSION}-macos-x64.dmg" \; 2>/dev/null || true
          find "$BUNDLE_X64/macos" -name "*.app.tar.gz" -exec cp {} "artifacts/cadente-${VERSION}-macos-x64.app.tar.gz" \; 2>/dev/null || true
          find "$BUNDLE_X64/macos" -name "*.app.tar.gz.sig" -exec cp {} "artifacts/cadente-${VERSION}-macos-x64.app.tar.gz.sig" \; 2>/dev/null || true

          echo "📦 Artifacts collected:"
          ls -la artifacts/

      - name: Delete source code before upload
        if: always()
        run: rm -rf source /tmp/build-*.log

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: artifacts-macos
          path: artifacts/*
          if-no-files-found: error

  build-linux:
    needs: validate
    runs-on: ubuntu-22.04
    steps:
      - name: Clone private repo at specific SHA
        env:
          PRIVATE_TOKEN: ${{ secrets.CATARINA_PRIVATE_READ_TOKEN }}
        run: |
          set -euo pipefail
          echo "::add-mask::${PRIVATE_TOKEN}"
          echo "::add-mask::$(pwd)/source"

          git clone --depth=1 \
            "https://x-access-token:${PRIVATE_TOKEN}@github.com/jeancatarina/catarina-claude.git" \
            source 2>&1 | head -1 || true

          cd source
          EXPECTED_SHA="${{ needs.validate.outputs.sha }}"
          git fetch --depth=1 origin "$EXPECTED_SHA" 2>/dev/null
          git checkout "$EXPECTED_SHA" 2>/dev/null

          ACTUAL_SHA=$(git rev-parse HEAD)
          if [ "$ACTUAL_SHA" != "$EXPECTED_SHA" ]; then
            echo "::error::SHA mismatch! Expected ${EXPECTED_SHA:0:8}, got ${ACTUAL_SHA:0:8}. Aborting."
            exit 1
          fi
          echo "✅ Checked out: ${ACTUAL_SHA:0:8}"

          git remote set-url origin "https://REDACTED@github.com/redacted/redacted.git"
          git config --unset-all http.https://github.com/.extraheader 2>/dev/null || true
          unset PRIVATE_TOKEN

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.7

      - name: Cache Cargo registry and target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            source/src-tauri/target
          key: linux-cargo-${{ hashFiles('source/src-tauri/Cargo.lock') }}
          restore-keys: |
            linux-cargo-

      - name: Cache apt packages
        id: apt-cache
        uses: actions/cache@v4
        with:
          path: ~/apt-cache
          key: linux-apt-webkit2gtk-v1

      - name: Install Linux dependencies
        run: |
          if [ -d ~/apt-cache ] && [ "$(ls -A ~/apt-cache 2>/dev/null)" ]; then
            echo "📦 Restoring cached .deb packages..."
            sudo cp ~/apt-cache/*.deb /var/cache/apt/archives/ 2>/dev/null || true
          fi
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf lld
          mkdir -p ~/apt-cache
          cp /var/cache/apt/archives/*.deb ~/apt-cache/ 2>/dev/null || true

      - name: Install frontend dependencies
        working-directory: source
        run: npm ci 2>&1 | tail -5

      - name: Build Tauri app
        working-directory: source
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ""
          RUSTC_WRAPPER: sccache
        run: |
          echo "🔨 Building linux x86_64..."
          if npx tauri build > /tmp/build-linux.log 2>&1; then
            echo "✅ Linux build succeeded ($(wc -l < /tmp/build-linux.log) log lines suppressed)"
          else
            EXIT_CODE=$?
            echo "::error::Linux build failed with exit code $EXIT_CODE"
            echo "--- Last 5 lines (sanitized) ---"
            tail -5 /tmp/build-linux.log | sed 's|source/||g; s|src-tauri/src/[^ ]*|[REDACTED_PATH]|g'
            rm -f /tmp/build-linux.log
            exit $EXIT_CODE
          fi
          rm -f /tmp/build-linux.log

      - name: Collect artifacts
        shell: bash
        run: |
          VERSION="${{ needs.validate.outputs.version }}"
          mkdir -p artifacts
          BUNDLE_DIR="source/src-tauri/target/release/bundle"

          find "$BUNDLE_DIR/appimage" -name "*.AppImage" -exec cp {} "artifacts/cadente-${VERSION}-linux-x64.AppImage" \; 2>/dev/null || true
          find "$BUNDLE_DIR/deb" -name "*.deb" -exec cp {} "artifacts/cadente-${VERSION}-linux-x64.deb" \; 2>/dev/null || true
          find "$BUNDLE_DIR/appimage" -name "*.AppImage.tar.gz" -exec cp {} "artifacts/cadente-${VERSION}-linux-x64.AppImage.tar.gz" \; 2>/dev/null || true
          find "$BUNDLE_DIR/appimage" -name "*.AppImage.tar.gz.sig" -exec cp {} "artifacts/cadente-${VERSION}-linux-x64.AppImage.tar.gz.sig" \; 2>/dev/null || true

          echo "📦 Artifacts collected:"
          ls -la artifacts/

      - name: Delete source code before upload
        if: always()
        run: rm -rf source /tmp/build-linux.log

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: artifacts-linux
          path: artifacts/*
          if-no-files-found: error

  build-windows:
    needs: validate
    runs-on: windows-latest
    steps:
      - name: Clone private repo at specific SHA
        shell: bash
        env:
          PRIVATE_TOKEN: ${{ secrets.CATARINA_PRIVATE_READ_TOKEN }}
        run: |
          set -euo pipefail
          echo "::add-mask::${PRIVATE_TOKEN}"
          echo "::add-mask::$(pwd)/source"

          git clone --depth=1 \
            "https://x-access-token:${PRIVATE_TOKEN}@github.com/jeancatarina/catarina-claude.git" \
            source 2>&1 | head -1 || true

          cd source
          EXPECTED_SHA="${{ needs.validate.outputs.sha }}"
          git fetch --depth=1 origin "$EXPECTED_SHA" 2>/dev/null
          git checkout "$EXPECTED_SHA" 2>/dev/null

          ACTUAL_SHA=$(git rev-parse HEAD)
          if [ "$ACTUAL_SHA" != "$EXPECTED_SHA" ]; then
            echo "::error::SHA mismatch! Expected ${EXPECTED_SHA:0:8}, got ${ACTUAL_SHA:0:8}. Aborting."
            exit 1
          fi
          echo "✅ Checked out: ${ACTUAL_SHA:0:8}"

          git remote set-url origin "https://REDACTED@github.com/redacted/redacted.git"
          git config --unset-all http.https://github.com/.extraheader 2>/dev/null || true
          unset PRIVATE_TOKEN

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.7

      - name: Cache Cargo registry and target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            source/src-tauri/target
          key: windows-cargo-${{ hashFiles('source/src-tauri/Cargo.lock') }}
          restore-keys: |
            windows-cargo-

      - name: Install frontend dependencies
        working-directory: source
        shell: bash
        run: npm ci 2>&1 | tail -5

      - name: Build Tauri app
        working-directory: source
        shell: bash
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ""
          RUSTC_WRAPPER: sccache
        run: |
          echo "🔨 Building windows x86_64..."
          if npx tauri build > /tmp/build-windows.log 2>&1; then
            echo "✅ Windows build succeeded ($(wc -l < /tmp/build-windows.log) log lines suppressed)"
          else
            EXIT_CODE=$?
            echo "::error::Windows build failed with exit code $EXIT_CODE"
            echo "--- Last 5 lines (sanitized) ---"
            tail -5 /tmp/build-windows.log | sed 's|source/||g; s|src-tauri/src/[^ ]*|[REDACTED_PATH]|g'
            rm -f /tmp/build-windows.log
            exit $EXIT_CODE
          fi
          rm -f /tmp/build-windows.log

      - name: Collect artifacts
        shell: bash
        run: |
          VERSION="${{ needs.validate.outputs.version }}"
          mkdir -p artifacts
          BUNDLE_DIR="source/src-tauri/target/release/bundle"

          find "$BUNDLE_DIR/msi" -name "*.msi" -exec cp {} "artifacts/cadente-${VERSION}-windows-x64.msi" \; 2>/dev/null || true
          find "$BUNDLE_DIR/nsis" -name "*.exe" -exec cp {} "artifacts/cadente-${VERSION}-windows-x64.exe" \; 2>/dev/null || true
          find "$BUNDLE_DIR/msi" -name "*.msi.zip" -exec cp {} "artifacts/cadente-${VERSION}-windows-x64.msi.zip" \; 2>/dev/null || true
          find "$BUNDLE_DIR/msi" -name "*.msi.zip.sig" -exec cp {} "artifacts/cadente-${VERSION}-windows-x64.msi.zip.sig" \; 2>/dev/null || true
          find "$BUNDLE_DIR/nsis" -name "*.nsis.zip" -exec cp {} "artifacts/cadente-${VERSION}-windows-x64.nsis.zip" \; 2>/dev/null || true
          find "$BUNDLE_DIR/nsis" -name "*.nsis.zip.sig" -exec cp {} "artifacts/cadente-${VERSION}-windows-x64.nsis.zip.sig" \; 2>/dev/null || true

          echo "📦 Artifacts collected:"
          ls -la artifacts/

      - name: Delete source code before upload
        if: always()
        shell: bash
        run: rm -rf source /tmp/build-windows.log

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: artifacts-windows
          path: artifacts/*
          if-no-files-found: error

  # ─────────────────────────────────────────────────────────────
  # Step 3: Create release with all artifacts
  # ─────────────────────────────────────────────────────────────
  release:
    needs: [validate, build-macos, build-linux, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: read
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: all-artifacts
          merge-multiple: true

      - name: List all artifacts
        run: ls -la all-artifacts/

      - name: Generate SHA256 checksums
        run: |
          cd all-artifacts
          sha256sum * > ../SHA256SUMS.txt 2>/dev/null || shasum -a 256 * > ../SHA256SUMS.txt
          echo "📋 Checksums:"
          cat ../SHA256SUMS.txt
          cp ../SHA256SUMS.txt ./SHA256SUMS.txt

      - name: Generate update.json
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${{ needs.validate.outputs.version }}"
          TAG="${{ needs.validate.outputs.tag }}"
          PUB_DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          BASE_URL="https://github.com/cadente-hub/cadente-hub.github.io/releases/download/${TAG}"

          # Read signature from .sig file — FAIL if missing
          read_sig() {
            local file="all-artifacts/$1"
            if [ -f "$file" ]; then
              cat "$file"
            else
              echo "::error::Missing signature file: $1"
              echo ""
            fi
          }

          DARWIN_AARCH64_SIG=$(read_sig "cadente-${VERSION}-macos-arm64.app.tar.gz.sig")
          DARWIN_X86_64_SIG=$(read_sig "cadente-${VERSION}-macos-x64.app.tar.gz.sig")
          LINUX_X86_64_SIG=$(read_sig "cadente-${VERSION}-linux-x64.AppImage.tar.gz.sig")

          # Windows: try NSIS first (default Tauri target), then MSI
          WINDOWS_SIG=$(read_sig "cadente-${VERSION}-windows-x64.nsis.zip.sig")
          WIN_UPDATER_FILE="cadente-${VERSION}-windows-x64.nsis.zip"
          if [ -z "$WINDOWS_SIG" ]; then
            WINDOWS_SIG=$(read_sig "cadente-${VERSION}-windows-x64.msi.zip.sig")
            WIN_UPDATER_FILE="cadente-${VERSION}-windows-x64.msi.zip"
          fi

          # Validate ALL signatures exist — never publish without them
          MISSING=0
          for SIG_NAME in "darwin-aarch64:$DARWIN_AARCH64_SIG" "darwin-x86_64:$DARWIN_X86_64_SIG" "linux-x86_64:$LINUX_X86_64_SIG" "windows-x86_64:$WINDOWS_SIG"; do
            PLATFORM="${SIG_NAME%%:*}"
            SIG_VALUE="${SIG_NAME#*:}"
            if [ -z "$SIG_VALUE" ]; then
              echo "::error::Empty signature for ${PLATFORM}. Updater will reject this update."
              MISSING=$((MISSING + 1))
            fi
          done
          if [ "$MISSING" -gt 0 ]; then
            echo "::error::${MISSING} platform(s) missing signatures. Aborting update.json generation."
            exit 1
          fi

          cat > update.json <<EOF
          {
            "version": "${VERSION}",
            "notes": "Cadente v${VERSION}",
            "pub_date": "${PUB_DATE}",
            "platforms": {
              "darwin-aarch64": {
                "signature": "${DARWIN_AARCH64_SIG}",
                "url": "${BASE_URL}/cadente-${VERSION}-macos-arm64.app.tar.gz"
              },
              "darwin-x86_64": {
                "signature": "${DARWIN_X86_64_SIG}",
                "url": "${BASE_URL}/cadente-${VERSION}-macos-x64.app.tar.gz"
              },
              "linux-x86_64": {
                "signature": "${LINUX_X86_64_SIG}",
                "url": "${BASE_URL}/cadente-${VERSION}-linux-x64.AppImage.tar.gz"
              },
              "windows-x86_64": {
                "signature": "${WINDOWS_SIG}",
                "url": "${BASE_URL}/${WIN_UPDATER_FILE}"
              }
            }
          }
          EOF

          # Validate JSON is parseable
          python3 -c "import json; json.load(open('update.json'))" || { echo "::error::Generated invalid JSON"; exit 1; }
          echo "✅ update.json generated with all signatures:"
          python3 -c "import json; d=json.load(open('update.json')); [print(f'  {k}: sig={v[\"signature\"][:20]}...') for k,v in d['platforms'].items()]"

      - name: Create release on cadente-hub.github.io
        env:
          GH_TOKEN: ${{ secrets.CATARINA_RELEASE_TOKEN }}
        run: |
          echo "::add-mask::${GH_TOKEN}"
          VERSION="${{ needs.validate.outputs.version }}"
          TAG="${{ needs.validate.outputs.tag }}"
          SHA="${{ needs.validate.outputs.sha }}"

          # Delete existing release if re-running
          gh release delete "$TAG" --repo cadente-hub/cadente-hub.github.io --yes 2>/dev/null || true

          gh release create "$TAG" \
            --repo cadente-hub/cadente-hub.github.io \
            --title "Cadente v${VERSION}" \
            --notes "## Cadente v${VERSION}

          Built from commit: ${SHA:0:8}

          ### Downloads
          - **macOS Apple Silicon**: \`cadente-${VERSION}-macos-arm64.dmg\`
          - **macOS Intel**: \`cadente-${VERSION}-macos-x64.dmg\`
          - **Linux**: \`cadente-${VERSION}-linux-x64.AppImage\` or \`.deb\`
          - **Windows**: \`cadente-${VERSION}-windows-x64.exe\` or \`.msi\`

          ---
          *Built via Secure Public Builder*" \
            --latest \
            all-artifacts/*

      - name: Update update.json in site repo
        env:
          GH_TOKEN: ${{ secrets.CATARINA_RELEASE_TOKEN }}
        run: |
          echo "::add-mask::${GH_TOKEN}"
          git clone --depth=1 https://x-access-token:${GH_TOKEN}@github.com/cadente-hub/cadente-hub.github.io.git site-repo
          cd site-repo
          cp ../update.json ./update.json
          if [ -d "dist" ]; then cp ../update.json ./dist/update.json; fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add update.json
          git commit -m "chore: update update.json for v${{ needs.validate.outputs.version }}" || echo "No changes"
          git push

      - name: Update Homebrew cask
        env:
          GH_TOKEN: ${{ secrets.CATARINA_RELEASE_TOKEN }}
        run: |
          echo "::add-mask::${GH_TOKEN}"
          VERSION="${{ needs.validate.outputs.version }}"

          if [ -z "$GH_TOKEN" ]; then
            echo "::warning::CATARINA_RELEASE_TOKEN not set, skipping Homebrew update"
            exit 0
          fi

          git clone --depth=1 https://x-access-token:${GH_TOKEN}@github.com/cadente-hub/homebrew-apps.git homebrew-repo
          cd homebrew-repo

          ARM64_DMG="../all-artifacts/cadente-${VERSION}-macos-arm64.dmg"
          X64_DMG="../all-artifacts/cadente-${VERSION}-macos-x64.dmg"

          ARM64_SHA=""
          X64_SHA=""
          if [ -f "$ARM64_DMG" ]; then ARM64_SHA=$(shasum -a 256 "$ARM64_DMG" | awk '{print $1}'); fi
          if [ -f "$X64_DMG" ]; then X64_SHA=$(shasum -a 256 "$X64_DMG" | awk '{print $1}'); fi

          {
            echo 'cask "cadente" do'
            echo "  version \"${VERSION}\""
            echo ''
            echo '  if Hardware::CPU.arm?'
            echo "    url \"https://github.com/cadente-hub/cadente-hub.github.io/releases/download/v#{version}/cadente-#{version}-macos-arm64.dmg\""
            echo "    sha256 \"${ARM64_SHA:-:no_check}\""
            echo '  else'
            echo "    url \"https://github.com/cadente-hub/cadente-hub.github.io/releases/download/v#{version}/cadente-#{version}-macos-x64.dmg\""
            echo "    sha256 \"${X64_SHA:-:no_check}\""
            echo '  end'
            echo ''
            echo '  name "Cadente"'
            echo '  desc "AI-powered desktop assistant — chat, terminal, Git, API testing, and more"'
            echo '  homepage "https://cadente-hub.github.io"'
            echo ''
            echo '  livecheck do'
            echo '    url "https://github.com/cadente-hub/cadente-hub.github.io/releases/latest"'
            echo '    strategy :github_latest'
            echo '  end'
            echo ''
            echo '  auto_updates true'
            echo '  depends_on macos: ">= :catalina"'
            echo ''
            echo '  app "Cadente.app"'
            echo ''
            echo '  zap trash: ['
            echo '    "~/Library/Application Support/com.cadente.app",'
            echo '    "~/Library/Caches/com.cadente.app",'
            echo '    "~/Library/Preferences/com.cadente.app.plist",'
            echo '    "~/Library/Saved Application State/com.cadente.app.savedState",'
            echo '  ]'
            echo 'end'
          } > Casks/cadente.rb

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Casks/cadente.rb
          git diff --cached --quiet && echo "No cask changes" && exit 0
          git commit -m "chore: bump cadente to v${VERSION}"
          git push

  # ─────────────────────────────────────────────────────────────
  # Auto-debug: dispatch full-log builds on the private repo
  # when any platform fails. Runs only on failure.
  # ─────────────────────────────────────────────────────────────
  debug-on-failure:
    needs: [validate, build-macos, build-linux, build-windows]
    if: failure()
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - job: build-macos
            targets: '["aarch64-apple-darwin","x86_64-apple-darwin"]'
          - job: build-linux
            targets: '["linux"]'
          - job: build-windows
            targets: '["windows"]'
    steps:
      - name: Dispatch debug builds to private repo
        env:
          GH_TOKEN: ${{ secrets.DEBUG_DISPATCH_TOKEN }}
        run: |
          echo "::add-mask::${GH_TOKEN}"
          SHA="${{ needs.validate.outputs.sha }}"

          for TARGET in $(echo '${{ matrix.targets }}' | jq -r '.[]'); do
            echo "🔍 Dispatching debug build for ${TARGET} @ ${SHA:0:8}"
            curl -s -o /dev/null -w "HTTP %{http_code}\n" \
              -X POST \
              -H "Accept: application/vnd.github+json" \
              -H "Authorization: Bearer ${GH_TOKEN}" \
              "https://api.github.com/repos/jeancatarina/catarina-claude/dispatches" \
              -d "{
                \"event_type\": \"debug-build\",
                \"client_payload\": {
                  \"target\": \"${TARGET}\",
                  \"sha\": \"${SHA}\"
                }
              }"
          done
          echo ""
          echo "📋 Check debug logs at: https://github.com/jeancatarina/catarina-claude/actions/workflows/debug-build.yml"
